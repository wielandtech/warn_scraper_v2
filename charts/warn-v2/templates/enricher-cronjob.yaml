{{- if .Values.enricher.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "warn-v2.fullname" . }}-enricher
  labels:
    {{- include "warn-v2.labels" . | nindent 4 }}
spec:
  schedule: {{ .Values.enricher.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        metadata:
          labels:
            {{- include "warn-v2.labels" . | nindent 12 }}
            app.kubernetes.io/component: enricher
        spec:
          restartPolicy: OnFailure
          containers:
            - name: enricher
              image: {{ include "warn-v2.image" . }}
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              args:
                - enrich
                - --limit
                - {{ .Values.enricher.limit | quote }}
                - --recent-years
                - {{ .Values.enricher.recentYears | quote }}
              env:
                {{- include "warn-v2.envSecrets" . | nindent 16 }}
              resources:
                {{- toYaml .Values.enricher.resources | nindent 16 }}
{{- end }}
