{{- if .Values.migrations.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "warn-v2.fullname" . }}-migrate-{{ .Release.Revision }}
  labels:
    {{- include "warn-v2.labels" . | nindent 4 }}
    app.kubernetes.io/component: migration
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  backoffLimit: 2
  template:
    metadata:
      labels:
        {{- include "warn-v2.labels" . | nindent 8 }}
        app.kubernetes.io/component: migration
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: {{ include "warn-v2.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["uv", "run", "alembic", "upgrade", "head"]
          env:
            {{- include "warn-v2.envSecrets" . | nindent 12 }}
{{- end }}
