# Default values for the warn-v2 chart.
# Override in the homelab w_homelab repo's HelmRelease.

image:
  repository: ghcr.io/wielandtech/warn-v2
  tag: ""  # defaults to .Chart.AppVersion
  pullPolicy: IfNotPresent

# Postgres connection. The cluster itself is the shared CNPG postgres-cluster
# in the database namespace (see w_homelab/clusters/prod/databases/).
database:
  # SealedSecret name producing DATABASE_URL
  secretName: warn-v2-db
  secretKey: url

# Anthropic API key for self-heal + enrichment agents.
anthropic:
  secretName: warn-v2-anthropic
  secretKey: api-key

github:
  # GITHUB_TOKEN with `repo` + `workflow` scopes for the self-heal PR opener.
  secretName: warn-v2-github
  secretKey: token

snapshotStorage:
  # NFS PVC for raw scrape snapshots (replay material for self-heal).
  storageClass: nfs-client
  size: 10Gi

scraper:
  schedule: "17 7 * * *"  # daily 07:17 local — off the :00 + :30 herd
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits:   { cpu: 1000m, memory: 1Gi }

enricher:
  enabled: true  # override to false in HelmRelease until Phase 4 is ready
  schedule: "23 */6 * * *"  # every 6h
  limit: 10       # max companies to enrich per CronJob run
  recentYears: 2  # only enrich companies with notices in the last N years
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits:   { cpu: 500m, memory: 512Mi }

api:
  enabled: true
  replicas: 1
  service:
    port: 8000
  ingress:
    enabled: false   # flip on in HelmRelease to expose externally
    className: traefik
    host: warn.lab.wielandtech.com
    tls: true        # provisions a cert-manager Certificate when annotations include cluster-issuer
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
      traefik.ingress.kubernetes.io/router.entrypoints: websecure
  resources:
    requests: { cpu: 50m, memory: 128Mi }
    limits:   { cpu: 500m, memory: 256Mi }

serviceMonitor:
  enabled: true   # picked up by your existing Prometheus
  interval: 30s

migrations:
  enabled: true   # set false only if you manage migrations out-of-band
